name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  REPO_NAME: ambulai-artifacts
  BACKEND_SERVICE: ambulai-backend
  FRONTEND_SERVICE: ambulai-frontend

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker $REGION-docker.pkg.dev

      # BACKEND
      - name: Build and Push Backend Image
        run: |
          IMAGE_PATH="$REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$BACKEND_SERVICE:${{ github.sha }}"
          docker build -t $IMAGE_PATH ./backend
          docker push $IMAGE_PATH

      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
          env_vars: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}
          flags: |
            --allow-unauthenticated
            --port=8080
            --timeout=15m
            --max-instances=5
            --memory=512Mi
            --cpu=1

      # FRONTEND
      - name: Build and Push Frontend Image
        run: |
          IMAGE_PATH="$REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$FRONTEND_SERVICE:${{ github.sha }}"
          docker build -t $IMAGE_PATH ./frontend
          docker push $IMAGE_PATH

      - name: Deploy Frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
          env_vars: |
            BACKEND_URL=${{ steps.deploy-backend.outputs.url }}
          flags: |
            --allow-unauthenticated
            --timeout=1m
            --max-instances=5
            --memory=256Mi
            --cpu=1
